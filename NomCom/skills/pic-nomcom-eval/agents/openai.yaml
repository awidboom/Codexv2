interface:
  display_name: "PIC-NomCom-Eval"
  short_description: "Assess PIC candidates vs Principal VP criteria"
  default_prompt: "Prepare an assessment of <Candidate> materials relative to the criteria in the Principal VP Evaluation Form. For each criterion A1-A4 and P1-P4: summarize supporting evidence, gaps, and contradictions. Cross-check supporting documents (feedback, meeting notes, LFAR, slide decks, surveys) for consistency and note discrepancies. Follow README.md evidence expectations. Write to Candidate <X>/Assessment.md."
