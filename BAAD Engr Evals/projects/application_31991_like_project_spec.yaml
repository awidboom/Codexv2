project_title: "Use Existing LPG Tanks S-646 and S-647 to Store Renewable Propane"
project_description: |
  Tesoro requests a Certificate of Exemption for two existing
  pressurized LPG tanks at Plant 14628. The project adds S-646 and S-647 to the
  renewable fuels process so they may be used to store renewable propane.

  The project is similar in scope and style to Application 31991. The facility is
  not proposing to increase renewable propane production, and the change does not
  affect the overall Renewable Fuels Project. The tanks are existing high-pressure
  storage vessels that are expected to remain exempt from permitting under
  Regulation 2-1-123.3.1 because they are pressurized LPG tanks with negligible
  direct emissions. Any fugitive losses are expected to be minimal and managed
  under the facility fugitives program.

  The evaluation should reflect that Permit Condition 27583 was previously used to
  exclude certain sources from the renewable fuels process, and this project removes
  S-646 and S-647 from that restriction because they will now be used to store
  renewable propane.
